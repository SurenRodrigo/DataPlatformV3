dbt_poc:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver: "ODBC Driver 18 for SQL Server"
      server: "{{ env_var('MSSQL_DATAPLATFORM_SERVER') }}"   # e.g. dataplatform99x.database.windows.net
      port: 1433
      database: "{{ env_var('MSSQL_DATAPLATFORM_DATABASE') }}"

      # where dbt models will be built:
      schema: "dbt_poc"
      user: "{{ env_var('MSSQL_DATAPLATFORM_USERNAME') }}"
      password: "{{ env_var('MSSQL_DATAPLATFORM_PASSWORD') }}"

      encrypt: true
      trust_cert: true
      login_timeout: 60